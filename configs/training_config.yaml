# ============================================================
# IndiaLexABSA — Training Configuration
# ============================================================

training:
  seed: 42
  output_dir: "models/checkpoints"
  logging_dir: "logs/training"

  # ── Common hyperparameters ──────────────────────────────────
  num_train_epochs: 10
  early_stopping_patience: 3
  gradient_accumulation_steps: 2
  fp16: true
  dataloader_num_workers: 4
  load_best_model_at_end: true
  metric_for_best_model: "eval_macro_f1"
  greater_is_better: true

  # ── InLegalBERT specific ────────────────────────────────────
  inlegalbert:
    learning_rate: 2.0e-5
    per_device_train_batch_size: 16
    per_device_eval_batch_size: 32
    warmup_ratio: 0.1
    weight_decay: 0.01
    max_grad_norm: 1.0

  # ── DeBERTa specific ───────────────────────────────────────
  deberta:
    learning_rate: 1.5e-5
    per_device_train_batch_size: 8
    per_device_eval_batch_size: 16
    warmup_ratio: 0.15
    weight_decay: 0.01
    max_grad_norm: 1.0

  # ── Domain adaptation (MLM) ────────────────────────────────
  domain_adaptation:
    mlm_probability: 0.15
    num_train_epochs: 3
    learning_rate: 5.0e-5
    per_device_train_batch_size: 8

  # ── Two-step fine-tuning ───────────────────────────────────
  two_step:
    step1_dataset: "loco_3class"          # LOCO pretraining
    step1_epochs: 3
    step2_dataset: "IndiaLexABSA_v1"      # Domain fine-tuning
    step2_epochs: 10

data:
  dataset_id: "IndiaLexABSA_v1"
  train_split: "train"
  val_split: "validation"
  test_split: "test"
  max_seq_length: 512
  # Class weights for imbalanced training
  class_weights: [1.0, 1.3, 1.4, 0.8, 1.8]  # [supportive, critical, suggestive, neutral, ambiguous]

hyperparameter_search:
  n_trials: 30
  direction: "maximize"
  metric: "eval_macro_f1"
  search_space:
    learning_rate: [1.0e-5, 5.0e-5]
    per_device_train_batch_size: [8, 16, 32]
    warmup_ratio: [0.05, 0.2]
    weight_decay: [0.0, 0.1]
    dropout: [0.1, 0.4]

wandb:
  project: "indialexabsa"
  tags: ["absa", "legal", "india", "mca"]
  log_model: true
