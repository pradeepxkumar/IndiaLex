# ============================================================
# IndiaLexABSA — Model Configuration
# ============================================================

models:
  inlegalbert:
    model_id: "law-ai/InLegalBERT"
    max_length: 512
    num_labels: 5
    dropout: 0.2
    checkpoint_dir: "models/checkpoints/inlegalbert_absa"
    
  deberta:
    model_id: "microsoft/deberta-v3-base"
    max_length: 512
    num_labels: 5
    dropout: 0.1
    checkpoint_dir: "models/checkpoints/deberta_absa"

  sbert:
    model_id: "sentence-transformers/all-mpnet-base-v2"
    # Not fine-tuned — used as-is for clause linking

  indicbert:
    model_id: "ai4bharat/indic-bert"
    max_length: 256
    num_labels: 3  # pos/neg/neu for Hindi auxiliary
    checkpoint_dir: "models/checkpoints/indicbert_sentiment"

  # Translation
  indictrans2:
    model_id: "ai4bharat/indictrans2-en-indic-1B"
    # Used for Hindi → English translation

sentiment_labels:
  - supportive
  - critical
  - suggestive
  - neutral
  - ambiguous

label2id:
  supportive: 0
  critical: 1
  suggestive: 2
  neutral: 3
  ambiguous: 4

id2label:
  0: supportive
  1: critical
  2: suggestive
  3: neutral
  4: ambiguous

sentiment_colors:
  supportive: "#2EC4B6"   # teal
  critical: "#E63946"     # coral/red
  suggestive: "#F4A261"   # amber
  neutral: "#8D99AE"      # grey
  ambiguous: "#9B5DE5"    # purple

ensemble:
  inlegalbert_weight: 0.5
  deberta_weight: 0.5
  confidence_threshold: 0.65  # below this → marked as low-confidence

clause_linking:
  similarity_threshold: 0.35
  top_k: 5
  mmr_lambda: 0.7  # diversity vs relevance trade-off

chromadb:
  path: "data/chromadb"
  collection_name: "dcb_clauses"
  embedding_function: "sbert"
